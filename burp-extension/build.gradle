plugins {
    id 'java'
}

group = 'com.hermes'
version = '0.1.0'

// Keep this Gradle file compatible with both older and newer Gradle versions.
def javaExt = extensions.findByName('java')
if (javaExt != null) {
    javaExt.sourceCompatibility = JavaVersion.toVersion('17')
    javaExt.targetCompatibility = JavaVersion.toVersion('17')
}

repositories {
    mavenCentral()
}

dependencies {
    compileOnly 'net.portswigger.burp.extensions:montoya-api:2026.4'
}

tasks.withType(JavaCompile).all {
    options.encoding = 'UTF-8'
    if (options.hasProperty('release')) {
        options.release = 17
    } else {
        sourceCompatibility = '17'
        targetCompatibility = '17'
        options.compilerArgs += ['-source', '17', '-target', '17']
    }
}
